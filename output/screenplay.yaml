meta:
  title: 《深渊代码》
  author: ''
  genre: 悬疑
  version: '1.0'
  source: AI 小说转剧本工具
characters:
- id: char_001
  name: 林锐
  role: protagonist
  arc: 从自我放逐的前网警/独立黑客，被一封匿名包裹强行拽回尘封十年的创伤核心；由压抑隐忍、高度理性化的技术型幸存者，逐步蜕变为直面系统性罪恶、主动重燃调查意志的行动者。其弧光始于‘被动接收线索’，终于‘主动拨出电话重启调查’——不再回避‘未完成的守护者’身份。
  aliases:
  - 林哥
- id: char_002
  name: 林晓
  role: protagonist
  arc: 虽全程未现身，但作为叙事麦高芬与精神向导，其弧线是‘从失语受害者到隐秘信息传递者’的逆转：通过预埋硬盘证据链（临床记录、音频日记、视频线索），完成跨越十年的主动求救与真相托付，将哥哥从‘寻找者’转化为‘执行者’。
  aliases:
  - 晓晓
  - 073号
- id: char_003
  name: 方远征
  role: antagonist
  arc: 从‘已死亡’的纸面结论，被林锐通过生物特征（左眼疤痕）与时间矛盾（尸体烧毁却留有清晰眼部特写）质疑为‘假死脱罪’；其弧线暗示系统性庇护网络的存在，是悬于全案之上的阴影巨兽。
- id: char_004
  name: 老周
  role: supporting
  arc: 从‘被动应答的旧日同事’，转变为林锐重启调查的关键技术支点；其两次沉默（查地址后、听闻方远征名字后）暗示其知晓更多体制内禁忌，角色功能正从工具人升格为潜在共谋者或知情警示者。
- id: char_005
  name: 307室女人
  role: supporting
  arc: 从‘可疑守门人’到‘关键信使’的转变；其递出纸条与提示‘缺一张照片’，表明她是林晓失踪案知情者甚至协助者，但自身处于被监视或胁迫状态，行动充满自保性矛盾。
  aliases:
  - 神秘女子
  - 苹果女人
acts:
- scenes:
  - scene_id: scene_001_001
    act_ref: act_001
    location: 林锐的公寓
    int_ext: INT
    time_of_day: NIGHT
    characters_present:
    - char_001
    beats:
    - type: action
      content: 雨点敲打着窗户，玻璃上划出一道道扭曲的水痕。电脑屏幕的蓝光映在林锐脸上，将他棱角分明的轮廓切割得更加冷硬。
    - type: action
      content: 键盘声密集而规律。他的手指在机械键盘上跳动，眼睛盯着屏幕上滚动的代码。
    - type: direction
      content: 镜头切换到电脑屏幕右下角的时间，显示凌晨两点十七分。
    - type: action
      content: 房间不大，陈设简单。一张床、一张桌、三台显示器组成的工位，墙角堆着几个纸箱。桌上放着一个相框，里面夹着一张泛黄的照片。
    - type: action
      content: 林锐停下敲击，端起旁边的马克杯。咖啡凉透了，苦涩的味道在舌尖蔓延。
    - type: dialogue
      char_ref: char_001
      line: （叹气）
      parenthetical: （看着相框）
      emotion: 忧郁
    - type: action
      content: 窗外传来救护车的鸣笛声，由远及近，又渐渐消失在雨夜深处。
    - type: action
      content: 林锐揉了揉眉心，正准备继续工作，门铃突然响了。短促的一声，在凌晨两点的寂静里格外刺耳。
    - type: dialogue
      char_ref: char_001
      line: （皱眉）谁？
      emotion: 警惕
    - type: action
      content: 显示器上的监控画面切换到了门口——走廊的声控灯亮着，昏黄的光线下，门口空无一人。
    - type: action
      content: 门铃又响了。这次他站了起来。脚步很轻，几乎听不到声音。走到门边时，右手下意识地摸向腰间——那里什么都没有。
    - type: direction
      content: 镜头特写林锐的手，停顿了一下。
    - type: action
      content: 他透过猫眼向外看。走廊空荡荡的，只有对面墙上那盏声控灯还亮着，光线微弱，照出一小片斑驳的墙皮。
    - type: action
      content: 林锐打开门。冷风裹着雨丝扑面而来，带着深秋特有的潮湿气息。走廊里确实没有人。但他低下头时，看见了门口的东西。
    - type: action
      content: 一个牛皮纸包裹，巴掌大小，用麻绳捆得整整齐齐。雨水已经打湿了纸面，边缘渗出深色的水渍。
    - type: action
      content: 林锐弯腰捡起来。包裹很轻，几乎没什么分量。翻过来看，正面用黑色马克笔写着两个字——林锐。字迹歪歪扭扭，像是左手写的。
    - type: direction
      content: 镜头拉近，特写包裹上的字迹。
    - type: action
      content: 他抬头扫了一眼走廊两端。左边是电梯间，右边是消防通道。声控灯刚好在这一刻熄灭，整个走廊陷入黑暗。
    - type: action
      content: 林锐退回屋内，关上门，反锁。
    - type: action
      content: 他把包裹放在桌上，没有急着拆。先去厨房倒了杯热水，蒸汽模糊了眼镜片。他摘下眼镜擦拭，透过雾气看着那个包裹。
    - type: action
      content: 麻绳的结打得很紧，是水手结。
    - type: action
      content: 他放下眼镜，从抽屉里拿出一把美工刀，小心地割断麻绳。牛皮纸展开的瞬间，一股霉味混合着樟脑丸的气味弥漫开来。
    - type: action
      content: 里面只有两样东西。一张老照片，边角泛黄，背面朝上。翻过来时，他的手顿住了。
    - type: direction
      content: 镜头特写照片，上面是两个孩子的合影。男孩大约十岁，穿着蓝色的校服，表情严肃地看着镜头。女孩比他矮半个头，扎着两个羊角辫，笑得露出缺了一颗的门牙。背景是一个老旧小区的花坛，月季开得正盛。
    - type: action
      content: 林锐的手指摩挲过照片上女孩的脸，指节微微发白。
    - type: action
      content: 另一件东西，是一把钥匙。黄铜材质，表面布满划痕，钥匙柄上贴着一小块发黄的标签纸。纸上的字迹已经模糊，但还能辨认出几个数字——307。
    - type: action
      content: 林锐盯着那串数字，瞳孔骤然收缩。
    - type: action
      content: 雨声忽然变得很响，像是整个世界都被浸泡在水里。他拿起手机，拨出一个号码。响了六声，无人接听。
    - type: action
      content: 他又拨了一次。
    - type: dialogue
      char_ref: char_004
      line: 林哥？大半夜的……
      emotion: 疑惑
    - type: dialogue
      char_ref: char_001
      line: 老周，帮我查一个地址。
      emotion: 坚定
    - type: dialogue
      char_ref: char_004
      line: 现在？
      emotion: 惊讶
    - type: dialogue
      char_ref: char_001
      line: 现在。
      emotion: 果断
    - type: action
      content: 他报出一串地址，电话那头沉默了几秒，然后是键盘敲击的声音。
    - type: dialogue
      char_ref: char_004
      line: 查到了。那是城西老工业区的一栋旧楼，已经列入拆迁计划了。怎么了？
      emotion: 疑惑
    - type: dialogue
      char_ref: char_001
      line: 没事。谢了。
      emotion: 冷静
    - type: action
      content: 他挂断电话，走到窗边。雨还在下，城市的灯火在雨幕中模糊成一片流动的光斑。玻璃上映出他的脸——三十岁的男人，眼角已经有了细纹，眼神却像十年前那个刚入警队的年轻人一样锋利。
    - type: action
      content: 他转过身，拿起外套。
    - type: direction
      content: 镜头拉远，展示桌上的老照片，二十年前的林晓还在笑着，浑然不知自己将在十年后的某个黄昏，永远消失在放学回家的路上。
    transition: FADE OUT
  act_id: act_001
